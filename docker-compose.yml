version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recibos-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      # Persistir la base de datos SQLite
      - backend-data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:sqlite:/app/data/recibos.db}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-prod}
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/api/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - recibos-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recibos-frontend
    ports:
      - "${FRONTEND_PORT:-9000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - recibos-network
    restart: unless-stopped

volumes:
  backend-data:
    driver: local

networks:
  recibos-network:
    driver: bridge
